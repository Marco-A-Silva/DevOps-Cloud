apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  labels:
    app: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
      - name: python-container
        image: m4rquinh00s/python-hello-world:v3
        imagePullPolicy: IfNotPresent # CRÍTICO: le dice que use la imagen que cargaste con Kind
        ports:
        - containerPort: 5000 # Cambia esto al puerto que use tu app (ej. 80, 5000, 8080)
---
apiVersion: v1
kind: Service
metadata:
  name: python-service
spec:
  selector:
    app: hello-world
  ports:
    - protocol: TCP
      port: 80       # Puerto del servicio
      targetPort: 5000 # Puerto donde escucha tu app dentro del contenedor
